<svg width="900" height="250" viewBox="0 0 900 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Md Mobin — Flutter Developer">
  <defs>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#bc8cff;#39d2c0;#58a6ff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#bc8cff">
        <animate attributeName="stop-color" values="#bc8cff;#39d2c0;#58a6ff;#bc8cff" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#1f2a44"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="898" height="248" rx="16" fill="url(#glow)" stroke="#30363d" stroke-width="2"/>

  <!-- braille-dot decorations, left cluster -->
  <g fill="#58a6ff">
    <circle cx="70" cy="70" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="90" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="110" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="70" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="110" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="150" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="170" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="2.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- braille-dot decorations, right cluster -->
  <g fill="#bc8cff">
    <circle cx="810" cy="80" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="80" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="100" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="120" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="160" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="180" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" begin="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <text x="450" y="105" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="url(#txt)" letter-spacing="1">Md Mobin</text>

  <text x="450" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#8b949e">Flutter Developer&#160;&#160;·&#160;&#160;Package Author&#160;&#160;·&#160;&#160;Tech Writer</text>

  <text x="450" y="205" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16" fill="#3fb950">$ flutter run --release<tspan fill="#3fb950">▊<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
</svg>
