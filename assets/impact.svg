<svg width="900" height="185" viewBox="0 0 900 185" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Production impact metrics">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#1f2a44"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="898" height="183" rx="16" fill="url(#glow)" stroke="#30363d" stroke-width="2"/>
  <text x="32" y="32" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15" fill="#3fb950">$ cat impact.log</text>
  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.000;1" dur="0.60s" begin="0.1s" fill="freeze"/>
    <rect x="40" y="45" width="185" height="110" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="64" cy="72" r="5" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="132" y="105" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#58a6ff">2.7M+</text>
    <text x="132" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">Sessions impacted</text>
  </g>
  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.250;1" dur="0.80s" begin="0.1s" fill="freeze"/>
    <rect x="255" y="45" width="185" height="110" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="279" cy="72" r="5" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="347" y="105" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#3fb950">11.13M+</text>
    <text x="347" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">Card tokenizations</text>
  </g>
  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.400;1" dur="1.00s" begin="0.1s" fill="freeze"/>
    <rect x="470" y="45" width="185" height="110" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="494" cy="72" r="5" fill="#e3b341">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="562" y="105" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#e3b341">35.16M+</text>
    <text x="562" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">Transactions handled</text>
  </g>
  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.500;1" dur="1.20s" begin="0.1s" fill="freeze"/>
    <rect x="685" y="45" width="185" height="110" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="709" cy="72" r="5" fill="#bc8cff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="777" y="105" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#bc8cff">48–75%</text>
    <text x="777" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">Performance gains</text>
  </g>
</svg>